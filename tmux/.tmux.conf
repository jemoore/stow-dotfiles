##### Window numbering #####
set -g base-index 1
setw -g pane-base-index 1

##### General UI #####
set -g mouse on
set -g history-limit 10000
set -g allow-rename off

##### Colors #####
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

##### Status bar #####
set -g status on
set -g status-interval 5
set -g status-justify centre

# Status bar colors
set -g status-bg "#1e1e1e"
set -g status-fg "#c0c0c0"

# Left side: session + window info
set -g status-left-length 40
# set -g status-left "#[fg=#00afff,bold] #S #[fg=#c0c0c0] #[fg=#ffffff]#I:#W "
set -g status-left "#[fg=#00afff,bold] #S #[fg=#c0c0c0] "

# Right side: system stats
set -g status-right-length 80
# set -g status-right "#[fg=#c0c0c0] #[fg=#5fd7ff]#(uptime -p) #[fg=#c0c0c0] #[fg=#ffd75f]%Y-%m-%d #[fg=#ffaf5f]%H:%M "
set -g status-right "#[fg=#c0c0c0] #[fg=#5fd7ff]%Y-%m-%d #[fg=#00afff]%H:%M "

##### Window titles #####
setw -g window-status-format " #[fg=#808080]#I:#W "
setw -g window-status-current-format " #[fg=#ffffff,bold]#I:#W "

##### Pane borders #####
set -g pane-border-style "fg=#444444"
set -g pane-active-border-style "fg=#00afff"

##### Message styling #####
set -g message-style "bg=#1e1e1e,fg=#00afff"
set -g message-command-style "bg=#1e1e1e,fg=#ffd75f"

# Enable clipboard access
set-option -g default-command "reattach-to-user-namespace -l zsh"
setw -g mode-keys vi

# Bind 'v' to start selection and 'y' to copy to system clipboard
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
set -g allow-passthrough on
set -s set-clipboard on
setw -g mode-style 'fg=#1F1F28,bg=#7E9CD8'

# Bind ']' to paste from system clipboard
bind ] run "reattach-to-user-namespace pbpaste | tmux load-buffer - && tmux paste-buffer"

# Bind split to something memorable
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Automaticall renumber windows
set -g renumber-windows on

# Rename window to dir
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# Swap windows
bind -r Left swap-window -t -1 \; select-window -t -1
bind -r Right swap-window -t +1 \; select-window -t +1

# Agent notifications
setw -g monitor-bell on
set -g bell-action other # only monitor bells in windows not currently open
setw -g window-status-bell-style 'fg=#C8C093 dotted-underscore'
